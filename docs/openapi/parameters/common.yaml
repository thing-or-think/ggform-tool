PageParam:
  name: page
  in: query
  required: false
  schema:
    type: integer
    minimum: 1
    default: 1
  example: 1

LimitParam:
  name: limit
  in: query
  required: false
  schema:
    type: integer
    minimum: 1
    maximum: 100
    default: 20
  example: 20

SortOrderParam:
  name: sortOrder
  in: query
  required: false
  schema:
    type: string
    enum:
      - asc
      - desc
    default: desc
  example: desc

FormIdParam:
  name: formId
  in: path
  required: true
  schema:
    type: string
    pattern: "^form_[A-Za-z0-9]+$"
  example: form_01HXYZABC

JobIdParam:
  name: jobId
  in: path
  required: true
  schema:
    type: string
    pattern: "^job_[A-Za-z0-9]+$"
  example: job_01HXYZABC
