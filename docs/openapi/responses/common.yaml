BadRequest:
  description: Bad request
  content:
    application/json:
      schema:
        type: object
        required:
          - success
          - message
          - error
          - meta
        properties:
          success:
            type: boolean
            example: false
          message:
            type: string
            example: Validation failed
          error:
            $ref: "../schemas/common.yaml#/ApiError"
          meta:
            $ref: "../schemas/common.yaml#/ApiMeta"

