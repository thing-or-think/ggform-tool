dashboardSummary:
  get:
    tags:
      - Dashboard
    summary: Get dashboard summary
    operationId: getDashboardSummary
    parameters:
      - name: from
        in: query
        required: false
        schema:
          type: string
          format: date-time
        example: "2026-05-18T00:00:00.000Z"
      - name: to
        in: query
        required: false
        schema:
          type: string
          format: date-time
        example: "2026-05-18T23:59:59.999Z"
    responses:
      "200":
        description: Dashboard summary fetched successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                message:
                  type: string
                  example: Dashboard summary fetched successfully
                data:
                  $ref: "../schemas/dashboard.yaml#/DashboardSummary"
                meta:
                  $ref: "../schemas/common.yaml#/ApiMeta"
      "400":
        $ref: "../responses/common.yaml#/BadRequest"
      "500":
        $ref: "../responses/common.yaml#/InternalServerError"
